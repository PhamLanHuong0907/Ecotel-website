    <script>
      (function() {
        const storedTheme = localStorage.getItem('theme');
        const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        
        if (storedTheme === 'light' || (!storedTheme && systemPrefersLight)) {
          document.documentElement.classList.add('light');
        } else {
          document.documentElement.classList.remove('light');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <div class="gtranslate_wrapper"></div>
    <script>
      window.gtranslateSettings = {
        "default_language": "vi",      // Ngôn ngữ gốc là Tiếng Việt
        "languages": ["vi", "en"],     // Chỉ cho phép chọn VI hoặc EN
        "wrapper_selector": ".gtranslate_wrapper",
        "alt_flags": {"en": "usa"},    // Dùng cờ Mỹ cho tiếng Anh (tùy chọn)
        "native_language_names": true,  // Hiển thị tên ngôn ngữ bằng tiếng bản địa
        "switcher_horizontal_position":"left",
        "switcher_vertical_position":"bottom",
        "float_switcher_open_direction":"top"
      }
    </script>
    <script src="/float.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
